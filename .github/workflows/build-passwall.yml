name: Build PassWall with ImmortalWrt SDK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: "ImmortalWrt SDK tar.xz URL"
        required: false
        default: "https://downloads.immortalwrt.org/releases/18.06-k5.4-SNAPSHOT/targets/sunxi/cortexa53/immortalwrt-sdk-18.06-k5.4-SNAPSHOT-sunxi-cortexa53_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
      passwall_packages:
        description: "Space-separated package list"
        required: false
        default: "luci-app-passwall luci-i18n-passwall-zh-cn"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-passwall.yml"
      - "build/passwall.env"

env:
  DEFAULT_SDK_URL: https://downloads.immortalwrt.org/releases/18.06-k5.4-SNAPSHOT/targets/sunxi/cortexa53/immortalwrt-sdk-18.06-k5.4-SNAPSHOT-sunxi-cortexa53_gcc-8.4.0_musl.Linux-x86_64.tar.xz
  PACKAGES_FEED: https://github.com/immortalwrt/packages.git
  PACKAGES_FEED_BRANCH: openwrt-18.06
  LUCI_FEED: https://github.com/immortalwrt/luci.git
  LUCI_FEED_BRANCH: openwrt-18.06
  PASSWALL_PACKAGES_FEED: https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git
  PASSWALL_LUCI_FEED: https://github.com/Openwrt-Passwall/openwrt-passwall.git
  PASSWALL_FEED_BRANCH: main
  TARGET_BOARD: sunxi
  TARGET_SUBTARGET: cortexa53
  ARCH_PACKAGES: aarch64_cortex-a53
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          docker-images: true
          tool-cache: true
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib gperf haveged help2man intltool lib32gcc-s1 \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python2.7 python3 python3-pip python3-ply python3-docutils qemu-utils \
            re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev

      - name: Load build config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f build/passwall.env ]]; then
            set -a
            source build/passwall.env
            set +a
          fi

          SDK_URL_INPUT="${{ github.event.inputs.sdk_url || '' }}"
          PASSWALL_PACKAGES_INPUT="${{ github.event.inputs.passwall_packages || '' }}"

          SDK_URL_INPUT="${SDK_URL_INPUT:-${SDK_URL:-${DEFAULT_SDK_URL}}}"
          PASSWALL_PACKAGES_INPUT="${PASSWALL_PACKAGES_INPUT:-${PASSWALL_PACKAGES:-luci-app-passwall luci-i18n-passwall-zh-cn}}"

          if [[ -z "${SDK_URL_INPUT}" ]]; then
            echo "::error::SDK_URL 不能为空。"
            exit 1
          fi

          echo "sdk_url=${SDK_URL_INPUT}" >> "${GITHUB_OUTPUT}"
          echo "passwall_packages=${PASSWALL_PACKAGES_INPUT}" >> "${GITHUB_OUTPUT}"

      - name: Download and extract SDK
        id: sdk
        shell: bash
        run: |
          set -euo pipefail
          sdk_archive="immortalwrt-sdk.tar.xz"
          for attempt in 1 2 3; do
            echo "SDK download attempt ${attempt}/3"
            if curl -fL --connect-timeout 30 --retry 5 --retry-delay 5 -o "${sdk_archive}" "${{ steps.cfg.outputs.sdk_url }}"; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "::error::SDK 下载失败：${{ steps.cfg.outputs.sdk_url }}"
              exit 1
            fi
            sleep 15
          done

          tar -xJf "${sdk_archive}"
          sdk_dir="$(find . -maxdepth 1 -type d \( -name 'immortalwrt-sdk-*' -o -name 'openwrt-sdk-*' \) | sort | head -n 1)"
          if [[ -z "${sdk_dir}" ]]; then
            echo "::error::SDK 解压后没有找到 immortalwrt-sdk-* 或 openwrt-sdk-* 目录。"
            exit 1
          fi
          sdk_dir="${sdk_dir#./}"
          echo "sdk_dir=${sdk_dir}" >> "${GITHUB_OUTPUT}"

      - name: Cache download directory
        uses: actions/cache@v4
        with:
          path: ${{ steps.sdk.outputs.sdk_dir }}/dl
          key: ${{ runner.os }}-immortalwrt-sdk-dl-${{ env.TARGET_BOARD }}-${{ env.TARGET_SUBTARGET }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-sdk-dl-

      - name: Add PassWall feeds
        working-directory: ${{ steps.sdk.outputs.sdk_dir }}
        shell: bash
        run: |
          set -euo pipefail
          PASSWALL_PACKAGES='${{ steps.cfg.outputs.passwall_packages }}'

          touch feeds.conf.default
          if ! grep -qE '^src-git(-full)?[[:space:]]+packages[[:space:]]' feeds.conf.default; then
            printf 'src-git packages %s;%s\n' "${PACKAGES_FEED}" "${PACKAGES_FEED_BRANCH}" >> feeds.conf.default
          fi
          if ! grep -qE '^src-git(-full)?[[:space:]]+luci[[:space:]]' feeds.conf.default; then
            printf 'src-git luci %s;%s\n' "${LUCI_FEED}" "${LUCI_FEED_BRANCH}" >> feeds.conf.default
          fi
          perl -0pi -e 's#\A#src-git passwall_packages '"${PASSWALL_PACKAGES_FEED}"';'"${PASSWALL_FEED_BRANCH}"'\nsrc-git passwall_luci '"${PASSWALL_LUCI_FEED}"';'"${PASSWALL_FEED_BRANCH}"'\n#' feeds.conf.default
          ./scripts/feeds update packages luci passwall_packages passwall_luci

          base_packages="luci-base luci-compat luci-lib-jsonc luci-lib-ipkg coreutils coreutils-base64 coreutils-nohup curl chinadns-ng dns2socks dnsmasq-full ip-full libuci-lua lua microsocks resolveip tcping"
          for pkg in ${base_packages} ${PASSWALL_PACKAGES}; do
            ./scripts/feeds install "${pkg}" || echo "::warning::feeds install ${pkg} 未找到或已由 SDK 内置，继续。"
          done

          ./scripts/feeds install luci-app-passwall

      - name: Patch package source mirrors
        working-directory: ${{ steps.sdk.outputs.sdk_dir }}
        run: |
          if [[ -f feeds/packages/net/curl/Makefile ]]; then
            perl -0pi -e 's#PKG_SOURCE_URL:=https://dl\.uxnr\.de/mirror/curl/ \\\n https://curl\.askapache\.com/download/ \\\n https://curl\.se/download/#PKG_SOURCE_URL:=https://sources.cdn.openwrt.org/ \\\n https://curl.se/download/#g' feeds/packages/net/curl/Makefile
          fi

      - name: Generate .config
        working-directory: ${{ steps.sdk.outputs.sdk_dir }}
        shell: bash
        run: |
          set -euo pipefail
          PASSWALL_PACKAGES='${{ steps.cfg.outputs.passwall_packages }}'
          BASE_PACKAGES="liblua lua libnl-tiny luci-base luci-compat luci-lib-ip luci-lib-jsonc luci-lib-ipkg coreutils coreutils-base64 coreutils-nohup curl chinadns-ng dns2socks dnsmasq-full ip-full libuci-lua microsocks resolveip tcping"

          {
            printf 'CONFIG_ALL_KMODS=n\n'
            printf 'CONFIG_ALL_NONSHARED=n\n'
            printf 'CONFIG_DEVEL=n\n'
            printf 'CONFIG_AUTOREMOVE=y\n'
            printf 'CONFIG_PACKAGE_luci-compat=y\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Hysteria is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Libev_Client is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Libev_Server is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Server is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Server is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadow_TLS is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_tuic_client is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray is not set\n'
            printf '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray_Plugin is not set\n'
          } > .config

          for pkg in ${BASE_PACKAGES} ${PASSWALL_PACKAGES}; do
            if [[ ! "${pkg}" =~ ^[A-Za-z0-9_+-]+$ ]]; then
              echo "::error::软件包名 ${pkg} 含有非法字符。"
              exit 1
            fi
            printf 'CONFIG_PACKAGE_%s=y\n' "${pkg}" >> .config
          done

          echo "Generated .config preview:"
          sed -n '1,20p' .config
          make defconfig

      - name: Build PassWall packages
        working-directory: ${{ steps.sdk.outputs.sdk_dir }}
        shell: bash
        run: |
          set -euo pipefail
          PASSWALL_PACKAGES='${{ steps.cfg.outputs.passwall_packages }}'

          build_target() {
            local target="$1"
            echo "Building ${target}"
            if ! make "${target}" -j"$(nproc)" V=s; then
              echo "::warning::${target} 并行编译失败，改用串行详细日志重试。"
              make "${target}" -j1 V=sc
            fi
          }

          stage_lua_headers() {
            local target_staging
            local toolchain_staging
            target_staging="$(find staging_dir -maxdepth 1 -type d -name 'target-*' | sort | head -n 1)"
            toolchain_staging="$(find staging_dir -maxdepth 1 -type d -name 'toolchain-*' | sort | head -n 1)"

            if [[ -z "${target_staging}" ]]; then
              echo "::error::没有找到 target staging 目录。"
              exit 1
            fi

            if find "${target_staging}" -path '*/usr/include/lua.h' -type f | grep -q .; then
              return 0
            fi

            echo "Staging Lua 5.1 headers for SDK LuCI builds"
            mkdir -p "${target_staging}/usr/include"
            if [[ -n "${toolchain_staging}" ]]; then
              mkdir -p "${toolchain_staging}/usr/include"
            fi

            curl -fL --retry 5 --connect-timeout 30 -o lua-5.1.5.tar.gz \
              https://sources.cdn.openwrt.org/lua-5.1.5.tar.gz
            tar -xzf lua-5.1.5.tar.gz

            for header in lua.h luaconf.h lauxlib.h lualib.h; do
              cp "lua-5.1.5/src/${header}" "${target_staging}/usr/include/"
              if [[ -n "${toolchain_staging}" ]]; then
                cp "lua-5.1.5/src/${header}" "${toolchain_staging}/usr/include/"
              fi
            done

            find staging_dir -maxdepth 5 -type f -name 'lua.h' -print
          }

          stage_libnl_tiny() {
            local target_staging
            local toolchain_bin
            local cc
            target_staging="$(find staging_dir -maxdepth 1 -type d -name 'target-*' | sort | head -n 1)"
            toolchain_bin="$(find staging_dir -maxdepth 3 -type d -path '*/bin' | grep '/toolchain-' | sort | head -n 1)"

            if [[ -z "${target_staging}" || -z "${toolchain_bin}" ]]; then
              echo "::error::没有找到 target staging 或 toolchain bin 目录。"
              exit 1
            fi

            if find "${target_staging}" -path '*/usr/include/libnl-tiny/netlink/msg.h' -type f | grep -q . \
              && find "${target_staging}" -path '*/usr/lib/libnl-tiny.so*' -type f | grep -q .; then
              return 0
            fi

            cc="$(find "${toolchain_bin}" -maxdepth 1 -type f -name '*-gcc' | sort | head -n 1)"
            if [[ -z "${cc}" ]]; then
              echo "::error::没有找到 SDK 交叉编译 gcc。"
              exit 1
            fi

            echo "Staging libnl-tiny for SDK LuCI builds"
            rm -rf libnl-tiny-src libnl-tiny-build libnl-tiny-dest
            git clone https://github.com/openwrt/libnl-tiny.git libnl-tiny-src
            git -C libnl-tiny-src checkout c291088f631d1694f7ba0444b59677b194348da8

            cmake -S libnl-tiny-src -B libnl-tiny-build \
              -DCMAKE_C_COMPILER="${cc}" \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_INSTALL_INCLUDEDIR=include
            cmake --build libnl-tiny-build --parallel "$(nproc)"
            DESTDIR="$(pwd)/libnl-tiny-dest" cmake --install libnl-tiny-build

            mkdir -p "${target_staging}/usr/include/libnl-tiny" "${target_staging}/usr/lib"
            cp -fpR libnl-tiny-dest/usr/include/libnl-tiny/* "${target_staging}/usr/include/libnl-tiny/"
            cp -fpP libnl-tiny-dest/usr/lib/libnl-tiny.so* "${target_staging}/usr/lib/"

            find "${target_staging}/usr/include/libnl-tiny" -type f -name 'msg.h' -print
            find "${target_staging}/usr/lib" -maxdepth 1 -type f -name 'libnl-tiny.so*' -print
          }

          stage_lua_headers
          stage_libnl_tiny

          # SDK builds need development headers staged before LuCI C modules build.
          for target in \
            package/utils/lua/compile \
            package/libs/libnl-tiny/compile \
            package/feeds/luci/luci-lib-ip/compile \
            package/feeds/luci/luci-lib-jsonc/compile \
            package/feeds/luci/luci-compat/compile
          do
            if [[ -f "${target%/compile}/Makefile" ]]; then
              build_target "${target}"
            else
              echo "::warning::跳过 ${target}，没有找到对应 Makefile。"
            fi
          done

          built_any=0
          for pkg in ${PASSWALL_PACKAGES}; do
            mapfile -t makefiles < <(find -L package -path "*/${pkg}/Makefile" -type f | sort)

            if [[ "${#makefiles[@]}" -eq 0 ]]; then
              echo "::warning::没有找到 ${pkg} 的独立 Makefile，可能是由其它 LuCI 包生成的翻译包，跳过直接编译。"
              continue
            fi

            for makefile in "${makefiles[@]}"; do
              target="${makefile%/Makefile}/compile"
              build_target "${target}"
              built_any=1
            done
          done

          if [[ "${built_any}" -eq 0 ]]; then
            echo "::warning::没有找到可直接编译的 PassWall 包路径，回退到完整 package/compile。"
            make package/compile -j"$(nproc)" V=s || make package/compile -j1 V=sc
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          shopt -s nullglob

          mapfile -t files < <(find "${{ steps.sdk.outputs.sdk_dir }}/bin/packages" -type f \( -name "*.ipk" -o -name "Packages*" \) | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::没有找到任何已编译的软件包，请检查前面的日志。"
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "${file}" upload/
          done

          if ! compgen -G "upload/*.ipk" > /dev/null; then
            echo "::error::没有收集到任何 ipk 软件包。"
            exit 1
          fi

          printf '%s\n' "${{ steps.cfg.outputs.passwall_packages }}" > upload/selected-packages.txt
          printf '%s\n' "${{ steps.cfg.outputs.sdk_url }}" > upload/sdk-url.txt

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: passwall-sdk-${{ env.TARGET_BOARD }}-${{ env.TARGET_SUBTARGET }}-${{ env.ARCH_PACKAGES }}
          path: upload/
          if-no-files-found: error
